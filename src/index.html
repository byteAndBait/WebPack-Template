<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f4;
      }
      .poem-box {
        font-family: "Amiri", serif; /* يفضل استخدام خط عربي رصين */
        font-size: 1.8rem;
        line-height: 2.5;
        padding: 30px;
        border-right: 5px solid #8b0000;
        background-color: #fff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .line {
        display: block;
        margin-bottom: 10px;
      }
      .shatr {
        display: inline-block;
        min-width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="poem-box">
      <div class="line">
        <span class="shatr">فَلَمَّا أَنَخْنَا رَكَزْنَا الرِّمَاحَ</span>
        <span class="shatr">فَوْقَ مَكَارِمِنَا وَالْعُلَا</span>
      </div>

      <div class="line">
        <span class="shatr">وَبِتْنَا نُقَبِّلُ أَسْيَافَنَا</span>
        <span class="shatr">وَنَمْسَحُهَا مِنْ دِمَاءِ الْعِدَا</span>
      </div>
    </div>
  </body>
</html>
